<style>
    .capi-card {

        overflow: hidden;

    .capi-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(57, 255, 20, 0.15);
        border-color: #39ff14;
    }

    .capi-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: linear-gradient(90deg, #00e5ff, #39ff14);
    }

    .capi-header {
        display: flex;

        padding-bottom: 15px;
    }

    .capi-logo {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        object-fit: cover;
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        margin-right: 15px;
        border: 2px solid #00e5ff;
    }

    .capi-title {
        color: #00e5ff;
        margin: 0;
        font-size: 1.4rem;
        text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
        font-weight: bold;
    }

    .capi-subtitle {
        color: #39ff14;
        font-size: 0.75rem;
        font-weight: bold;
        margin-top: 5px;
    }

    .capi-body {
        margin-bottom: 25px;
        line-height: 1.5;
        font-size: 0.95rem;
    }

    .capi-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 20px;
    }

        background: rgba(88, 166, 255, 0.1);

        font-size: 0.75rem;
        border: 1px solid rgba(88, 166, 255, 0.3);
    }

    .capi-btn {
        display: block;
        text-align: center;
        background-color: transparent;
        color: #39ff14;
        padding: 12px 20px;
        font-size: 1rem;
        font-weight: bold;
        text-decoration: none;
        border: 1px dashed #39ff14;
        border-radius: 4px;
        transition: all 0.3s ease;
        text-transform: uppercase;
    }

    .capi-btn:hover {
        background-color: #39ff14;
        color: #0d1117;

    </div>
