    <!-- SEÇÃO 1: O PÓDIO -->
    <section class="podium-section">
        <!-- Card da Esquerda (2º Lugar) -->
        <article class="podium-card rank-2">
            <div class="podium-info">
                <h2 class="habit-name">Shadowing diário</h2>
                <div class="habit-value" id="counter-english">0<span class="unit">dias</span></div>
            </div>
            <div class="progress-track"><div class="progress-fill fill-blue"></div></div>
        </article>
        
        <!-- Card Central (1º Lugar) -->
        <article class="podium-card rank-1">
            <div class="podium-info">
                <h2 class="habit-name">Ofensiva de commits</h2>
                <div class="habit-value" id="counter-engineering">{{ github_streak }} <span class="unit">dias</span></div>
            </div>
            <div class="progress-track"><div class="progress-fill fill-green"></div></div>
        </article>

        <!-- Card da Direita (3º Lugar) -->
        <article class="podium-card rank-3">
            <div class="podium-info">
                <h2 class="habit-name">Listening diário</h2>
                <div class="habit-value" id="counter-listening">0 <span class="unit">dias</span></div>
            </div>
            <div class="progress-track"><div class="progress-fill fill-amber"></div></div>
        </article>
    </section>
