<!-- PÓDIO SIMPLIFICADO — ordenado por maior streak -->
<section class="podium-section">

    <!-- 1º — Listening em inglês (maior streak) -->
    <article class="podium-chip rank-1" data-counter-id="listening">
        <div class="podium-chip-left">
            <span class="podium-rank-badge">01</span>
            <div>
                <div class="podium-chip-name">Listening em inglês</div>
                <div class="podium-chip-meta">desde 13/12/2025</div>
            </div>
        </div>
        <div class="podium-chip-right">
            <div class="podium-chip-value" id="counter-listening">0 <span class="podium-unit">dias</span></div>
            <div class="podium-mini-heatmap" id="hm-listening"></div>
        </div>
    </article>

    <!-- 2º — Ofensiva de commits -->
    <article class="podium-chip rank-2" data-counter-id="engineering">
        <div class="podium-chip-left">
            <span class="podium-rank-badge">02</span>
            <div>
                <div class="podium-chip-name">Ofensiva de commits</div>
                <div class="podium-chip-meta">streak contínuo</div>
            </div>
        </div>
        <div class="podium-chip-right">
            <div class="podium-chip-value">{{ github_streak }} <span class="podium-unit">dias</span></div>
            <div class="podium-mini-heatmap" id="hm-engineering" data-streak="{{ github_streak }}"></div>
        </div>
    </article>

    <!-- 3º — Shadowing diário -->
    <article class="podium-chip rank-3" data-counter-id="english">
        <div class="podium-chip-left">
            <span class="podium-rank-badge">03</span>
            <div>
                <div class="podium-chip-name">Shadowing diário</div>
                <div class="podium-chip-meta">desde 17/06/2026</div>
            </div>
        </div>
        <div class="podium-chip-right">
            <div class="podium-chip-value" id="counter-english">0 <span class="podium-unit">dias</span></div>
            <div class="podium-mini-heatmap" id="hm-english"></div>
        </div>
    </article>

</section>
